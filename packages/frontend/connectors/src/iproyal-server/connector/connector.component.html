<ng-container [formGroup]="subForm">
    @if (subForm.controls['productId']; as c) {
        <c-row>
            <label cLabel cCol md="2" for="productId">Product</label>

            <c-col md="10">
                <c-input-group>
                    <select
                        cSelect
                        id="productId"
                        formControlName="productId"
                        (change)="productIdChanged()">
                        <option [ngValue]="null" disabled>----- Select Product ------</option>
                        <option [ngValue]="3">Datacenter</option>
                        <option [ngValue]="9">ISP</option>
                    </select>
                </c-input-group>
            </c-col>
        </c-row>
    }
    @if (subForm.controls['country']; as c) {
        <c-row>
            <label cLabel cCol md="2" for="country">Country</label>

            <c-col md="10">
                <c-input-group>
                    <select
                        cSelect
                        id="country"
                        formControlName="country"
                        [attr.disabled]="processingCountries ? true : null">
                        <option [ngValue]="null" disabled>----- Select Country ------</option>
                        <option value="all">All</option>
                        @for (country of countries; track country) {
                            <option value="{{ country }}">{{ country }}</option>
                        }
                    </select>

                    @if (processingCountries) {
                        <span cInputGroupText>
                            <svg cIcon name="cilLoopCircular" class="spin"></svg>
                        </span>
                    }
                </c-input-group>
            </c-col>
        </c-row>
    }
</ng-container>
